<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>ITLGS - Tea Quality Analytics</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:#eef5ee;
            color:#1f2937;
            min-height:100vh;
            padding:20px;
        }

        .container{
            max-width:1200px;
            margin:auto;
        }

        .title{
            text-align:center;
            margin-bottom:25px;
        }

        .title h1{
            font-size:38px;
            color:#166534;
            margin-bottom:10px;
        }

        .title p{
            color:#555;
            font-size:16px;
        }

        .main-grid{
            display:grid;
            grid-template-columns:1.2fr 1fr;
            gap:20px;
        }

        .card{
            background:white;
            border-radius:20px;
            padding:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .video-box{
            width:100%;
            aspect-ratio:16/10;
            background:black;
            border-radius:16px;
            overflow:hidden;
        }

        video{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .controls{
            margin-top:15px;
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:12px;
        }

        button{
            padding:14px;
            border:none;
            border-radius:14px;
            background:#166534;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.2s;
        }

        button:hover{
            background:#14532d;
        }

        input[type="file"]{
            margin-top:15px;
            width:100%;
            padding:12px;
            border-radius:12px;
            border:1px solid #ccc;
            background:white;
        }

        .status{
            margin-top:15px;
            padding:12px;
            border-radius:12px;
            background:#f3f4f6;
            color:#555;
        }

        .analytics-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:15px;
            margin-top:20px;
        }

        .analytics-card{
            border-radius:16px;
            padding:18px;
            text-align:center;
            color:white;
        }

        .fine{
            background:#15803d;
        }

        .coarse{
            background:#ca8a04;
        }

        .banjhi{
            background:#dc2626;
        }

        .rejected{
            background:#6b7280;
        }

        .analytics-card h3{
            font-size:15px;
            margin-bottom:8px;
        }

        .analytics-card p{
            font-size:28px;
            font-weight:bold;
        }

        .quality-section{
            margin-top:20px;
            background:#f8faf8;
            border-radius:18px;
            padding:18px;
            border:1px solid #d1d5db;
        }

        .quality-row{
            display:flex;
            justify-content:space-between;
            margin-bottom:14px;
            font-size:17px;
        }

        .quality-row:last-child{
            margin-bottom:0;
        }

        .quality-status{
            color:#166534;
            font-weight:bold;
        }

        .chart-container{
            margin-top:25px;
        }

        canvas{
            width:100% !important;
            max-height:320px;
        }

        .preview{
            margin-top:20px;
        }

        .preview img{
            width:100%;
            border-radius:16px;
        }

        @media(max-width:900px){

            .main-grid{
                grid-template-columns:1fr;
            }

            .analytics-grid{
                grid-template-columns:1fr 1fr;
            }
        }

        @media(max-width:600px){

            .controls{
                grid-template-columns:1fr;
            }

            .analytics-grid{
                grid-template-columns:1fr;
            }

            .title h1{
                font-size:28px;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <div class="title">
        <h1>🍃 Intelligent Tea Leaf Grading System</h1>
        <p>AI Powered Tea Quality Analytics Platform</p>
    </div>

    <div class="main-grid">

        <!-- LEFT -->

        <div class="card">

            <div class="video-box">
                <video id="video" autoplay playsinline muted></video>
            </div>

            <div class="controls">
                <button id="startBtn">Start Camera</button>
                <button id="captureBtn">Capture & Analyze</button>
            </div>

            <input type="file" id="fileInput" accept="image/*">

            <div class="status" id="status">
                System Ready
            </div>

            <div class="preview" id="previewBox" style="display:none;">
                <img id="previewImage">
            </div>

        </div>

        <!-- RIGHT -->

        <div class="card">

            <h2 style="margin-bottom:15px;">
                Tea Quality Analytics
            </h2>

            <div class="analytics-grid">

                <div class="analytics-card fine">
                    <h3>Fine Tea</h3>
                    <p id="finePercent">0%</p>
                </div>

                <div class="analytics-card coarse">
                    <h3>Coarse Tea</h3>
                    <p id="coarsePercent">0%</p>
                </div>

                <div class="analytics-card banjhi">
                    <h3>Banjhi</h3>
                    <p id="banjhiPercent">0%</p>
                </div>

                <div class="analytics-card rejected">
                    <h3>Rejected</h3>
                    <p id="rejectPercentCard">0%</p>
                </div>

            </div>

            <div class="quality-section">

                <div class="quality-row">
                    <span>Rejected</span>
                    <strong id="rejectPercent">0%</strong>
                </div>

                <div class="quality-row">
                    <span>Total Detected</span>
                    <strong id="totalDetected">0</strong>
                </div>

                <div class="quality-row">
                    <span>Quality Score</span>
                    <strong id="qualityScore">0</strong>
                </div>

                <div class="quality-row">
                    <span>Batch Status</span>

                    <span class="quality-status" id="qualityStatus">
                        Waiting...
                    </span>
                </div>

            </div>

            <div class="chart-container">
                <canvas id="teaChart"></canvas>
            </div>

        </div>

    </div>

</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");

    const startBtn = document.getElementById("startBtn");
    const captureBtn = document.getElementById("captureBtn");

    const fileInput = document.getElementById("fileInput");

    const statusBox = document.getElementById("status");

    const previewBox = document.getElementById("previewBox");
    const previewImage = document.getElementById("previewImage");

    let stream = null;

    // -----------------------------------
    // CHART
    // -----------------------------------

    const ctx = document.getElementById("teaChart");

    const teaChart = new Chart(ctx, {

        type: "doughnut",

        data: {

            labels: [
                "Fine",
                "Coarse",
                "Banjhi",
                "Rejected"
            ],

            datasets: [{
                data: [0,0,0,0],

                backgroundColor: [
                    "#15803d",
                    "#ca8a04",
                    "#dc2626",
                    "#6b7280"
                ]
            }]
        },

        options: {

            responsive:true,

            plugins:{
                legend:{
                    position:"bottom"
                }
            }
        }
    });

    // -----------------------------------
    // START CAMERA
    // -----------------------------------

async function startCamera(){

    try{

        stream = await navigator.mediaDevices.getUserMedia({

            video:{

                facingMode:{
                    ideal:"environment"
                },

                width:{ ideal:1280 },
                height:{ ideal:720 }
            },

            audio:false
        });

        video.srcObject = stream;

        statusBox.innerHTML = "📷 Back Camera Started";

    }catch(error){

        console.error(error);

        statusBox.innerHTML = "❌ Camera Access Denied";
    }
}

    // -----------------------------------
    // ANALYZE IMAGE
    // -----------------------------------

    async function analyzeBlob(blob){

        try{

            statusBox.innerHTML = "🔍 Analyzing Tea Leaves...";

            const formData = new FormData();

            formData.append("image", blob, "image.jpg");

            const response = await fetch("/predict", {

                method:"POST",
                body:formData
            });

            const data = await response.json();

            updateUI(data);

            statusBox.innerHTML = "✅ Analysis Complete";

        }catch(error){

            console.error(error);

            statusBox.innerHTML = "❌ Server Error";
        }
    }

    // -----------------------------------
    // UPDATE UI
    // -----------------------------------

    function updateUI(data){

        document.getElementById("finePercent").innerHTML =
            data.fine_percent + "%";

        document.getElementById("coarsePercent").innerHTML =
            data.coarse_percent + "%";

        document.getElementById("banjhiPercent").innerHTML =
            data.banjhi_percent + "%";

        document.getElementById("rejectPercent").innerHTML =
            data.reject_percent + "%";

        document.getElementById("rejectPercentCard").innerHTML =
            data.reject_percent + "%";

        document.getElementById("qualityScore").innerHTML =
            data.quality_score;

        document.getElementById("qualityStatus").innerHTML =
            data.quality_status;

        document.getElementById("totalDetected").innerHTML =
            data.total_detected;

        // UPDATE CHART

        teaChart.data.datasets[0].data = [

            data.fine_percent,
            data.coarse_percent,
            data.banjhi_percent,
            data.reject_percent
        ];

        teaChart.update();
    }

    // -----------------------------------
    // CAPTURE FRAME
    // -----------------------------------

    captureBtn.addEventListener("click", async ()=>{

        if(!video.videoWidth){

            statusBox.innerHTML = "❌ Camera Not Ready";

            return;
        }

        const context = canvas.getContext("2d");

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        context.drawImage(video,0,0);

        canvas.toBlob(async function(blob){

            await analyzeBlob(blob);

        }, "image/jpeg", 0.95);

    });

    // -----------------------------------
    // FILE UPLOAD
    // -----------------------------------

    fileInput.addEventListener("change", async (event)=>{

        const file = event.target.files[0];

        if(!file) return;

        previewBox.style.display = "block";

        previewImage.src = URL.createObjectURL(file);

        await analyzeBlob(file);

    });

    // -----------------------------------
    // START CAMERA BUTTON
    // -----------------------------------

    startBtn.addEventListener("click", startCamera);

</script>

</body>
</html>
