<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITLGS - Tea Grading</title>
    <style>
        :root {
            --bg: #f4f8f2;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #1f7a4c;
            --primary-dark: #16603b;
            --border: #d7e3d3;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #eef8ef 0%, #f8fbf6 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .app {
            width: 100%;
            max-width: 760px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            padding: 20px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(1.5rem, 3vw, 2rem);
            text-align: center;
        }

        .subtitle {
            margin: 0 0 20px;
            text-align: center;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .video-wrap,
        .preview-wrap {
            width: 100%;
            aspect-ratio: 16 / 10;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        video,
        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .controls-full {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        button,
        select,
        input[type="file"] {
            width: 100%;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 1rem;
        }

        button {
            border: 0;
            background: var(--primary);
            color: white;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: var(--primary-dark);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        select,
        input[type="file"] {
            border: 1px solid var(--border);
            background: white;
            color: var(--text);
        }

        .status,
        .result {
            border-radius: 14px;
            padding: 14px;
            background: #f8faf8;
            border: 1px solid var(--border);
        }

        .status {
            margin-bottom: 12px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .result {
            text-align: left;
            line-height: 1.6;
            font-weight: 600;
        }

        .section-title {
            margin: 18px 0 10px;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        canvas {
            display: none;
        }

        @media (max-width: 600px) {
            .app {
                padding: 16px;
            }

            .controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <h1>Intelligent Tea Leaf Grading System</h1>
        <p class="subtitle">Capture from camera or upload an image from your device.</p>

        <div class="section-title">Live Camera</div>
        <div class="video-wrap">
            <video id="video" autoplay playsinline muted></video>
        </div>

        <div class="controls">
            <button id="frontBtn" type="button">Front Camera</button>
            <button id="backBtn" type="button">Back Camera</button>
        </div>

        <div class="controls-full">
            <select id="cameraSelect">
                <option value="">Select camera</option>
            </select>
            <button id="captureBtn" type="button" disabled>Capture & Analyze</button>
        </div>

        <div class="section-title">Upload From Device</div>
        <div class="controls-full">
            <input id="fileInput" type="file" accept="image/*" />
            <button id="uploadBtn" type="button" disabled>Upload & Analyze</button>
        </div>

        <div id="previewSection" style="display:none;">
            <div class="section-title">Selected Image</div>
            <div class="preview-wrap">
                <img id="previewImage" alt="Selected preview" />
            </div>
        </div>

        <div id="status" class="status">Initializing camera...</div>
        <div id="result" class="result">No result yet.</div>

        <canvas id="canvas"></canvas>
    </div>

    <script>
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const result = document.getElementById("result");
        const statusBox = document.getElementById("status");
        const cameraSelect = document.getElementById("cameraSelect");
        const captureBtn = document.getElementById("captureBtn");
        const frontBtn = document.getElementById("frontBtn");
        const backBtn = document.getElementById("backBtn");
        const fileInput = document.getElementById("fileInput");
        const uploadBtn = document.getElementById("uploadBtn");
        const previewSection = document.getElementById("previewSection");
        const previewImage = document.getElementById("previewImage");

        let currentStream = null;
        let videoDevices = [];
        let selectedFile = null;

        function setStatus(message) {
            statusBox.textContent = message;
        }

        function stopCurrentStream() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
        }

        async function loadCameraList() {
            const devices = await navigator.mediaDevices.enumerateDevices();
            videoDevices = devices.filter(device => device.kind === "videoinput");

            cameraSelect.innerHTML = "";

            if (videoDevices.length === 0) {
                const option = document.createElement("option");
                option.value = "";
                option.textContent = "No camera found";
                cameraSelect.appendChild(option);
                return;
            }

            videoDevices.forEach((device, index) => {
                const option = document.createElement("option");
                option.value = device.deviceId;
                option.textContent = device.label || `Camera ${index + 1}`;
                cameraSelect.appendChild(option);
            });
        }

        function findCameraByFacing(facing) {
            const keywords = facing === "environment"
                ? ["back", "rear", "environment"]
                : ["front", "user"];

            return videoDevices.find(device => {
                const label = (device.label || "").toLowerCase();
                return keywords.some(word => label.includes(word));
            });
        }

        async function startCamera({ deviceId = null, facingMode = "environment" } = {}) {
            stopCurrentStream();
            setStatus("Starting camera...");

            let constraints = {
                audio: false,
                video: deviceId
                    ? {
                        deviceId: { exact: deviceId },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                    : {
                        facingMode: { ideal: facingMode },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            } catch (error) {
                if (!deviceId) {
                    currentStream = await navigator.mediaDevices.getUserMedia({
                        audio: false,
                        video: true
                    });
                } else {
                    throw error;
                }
            }

            video.srcObject = currentStream;
            await video.play();
            await loadCameraList();

            const activeTrack = currentStream.getVideoTracks()[0];
            const settings = activeTrack.getSettings();

            if (settings.deviceId) {
                cameraSelect.value = settings.deviceId;
            }

            captureBtn.disabled = false;
            setStatus("Camera ready.");
        }

        async function switchFacingMode(facingMode) {
            try {
                const matchedCamera = findCameraByFacing(facingMode);
                if (matchedCamera) {
                    await startCamera({ deviceId: matchedCamera.deviceId });
                } else {
                    await startCamera({ facingMode });
                }
            } catch (error) {
                console.error(error);
                setStatus("Unable to switch camera.");
            }
        }

        async function analyzeImageBlob(blob, filename = "image.jpg") {
            try {
                const formData = new FormData();
                formData.append("image", blob, filename);

                setStatus("Analyzing image...");

                const response = await fetch("/predict", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    throw new Error("Prediction request failed");
                }

                const data = await response.json();

                result.innerHTML =
                    "Grade: " + data.grade +
                    "<br>PN: " + Number(data.PN).toFixed(2) + "%" +
                    "<br>SB: " + data.sb +
                    " | 1L: " + data.l1 +
                    " | 2L: " + data.l2;

                setStatus("Analysis complete.");
            } catch (error) {
                console.error(error);
                result.textContent = "Failed to analyze image.";
                setStatus("Server request failed.");
            }
        }

        async function capture() {
            if (!video.videoWidth || !video.videoHeight) {
                setStatus("Camera is not ready yet.");
                return;
            }

            setStatus("Capturing image...");

            const context = canvas.getContext("2d");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);

            canvas.toBlob(async function(blob) {
                if (!blob) {
                    setStatus("Could not capture image.");
                    return;
                }
                await analyzeImageBlob(blob, "frame.jpg");
            }, "image/jpeg", 0.95);
        }

        async function uploadSelectedFile() {
            if (!selectedFile) {
                setStatus("Please choose an image first.");
                return;
            }

            await analyzeImageBlob(selectedFile, selectedFile.name || "upload.jpg");
        }

        cameraSelect.addEventListener("change", async (event) => {
            if (!event.target.value) return;
            try {
                await startCamera({ deviceId: event.target.value });
            } catch (error) {
                console.error(error);
                setStatus("Unable to access selected camera.");
            }
        });

        fileInput.addEventListener("change", (event) => {
            const file = event.target.files[0];
            selectedFile = file || null;
            uploadBtn.disabled = !selectedFile;

            if (selectedFile) {
                previewSection.style.display = "block";
                previewImage.src = URL.createObjectURL(selectedFile);
                setStatus("Image selected. Ready to upload.");
            } else {
                previewSection.style.display = "none";
                previewImage.removeAttribute("src");
            }
        });

        frontBtn.addEventListener("click", () => switchFacingMode("user"));
        backBtn.addEventListener("click", () => switchFacingMode("environment"));
        captureBtn.addEventListener("click", capture);
        uploadBtn.addEventListener("click", uploadSelectedFile);

        async function init() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                setStatus("Camera API is not supported in this browser.");
                result.textContent = "Use a modern browser like Chrome or Edge.";
                return;
            }

            try {
                await startCamera({ facingMode: "environment" });
            } catch (error) {
                console.error(error);
                setStatus("Could not access camera. You can still upload an image.");
                result.textContent = "Camera permission denied or unavailable.";
            }
        }

        init();
    </script>
</body>
</html>
